{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow border-0 col-md-6 mx-auto text-center">

        <div class="card-header bg-danger text-white">
            Confirmación de eliminación
        </div>

        <div class="card-body">

            <h4 class="mb-3">¿Estás seguro?</h4>

            <p class="text-muted">
                Vas a eliminar <strong>TODOS LOS DATOS</strong> del sistema.<br>
                Esta acción no se puede deshacer.
            </p>

            <form method="post" action="{% url 'reset_data' %}">
                {% csrf_token %}

                <button class="btn btn-danger w-100 mb-2">
                    Sí, eliminar todo
                </button>

            </form>

            <a href="{% url 'import_data' %}" class="btn btn-secondary w-100">
                Cancelar
            </a>

        </div>

    </div>

</div>

{% endblock %}
